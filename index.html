<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Earth</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">

    <!-- daisy UI and Tailwind cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>
    <!-- navbar -->
    <div class="navbar bg-base-100 shadow-sm px-16 bg-[#15803D]">
        <div class="navbar-start">
            <div class="dropdown">
                <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h8m-8 6h16" />
                    </svg>
                </div>
                <ul tabindex="-1"
                    class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow">
                    <li class="text-base"><a>About</a></li>
                    <li class="text-base"><a>Gallery</a></li>
                    <li class="text-base"><a>Plant a Tree</a></li>
                </ul>
            </div>
            <div class="flex items-center gap-2">
                <img src="./assets/logo.png" width=45px alt="">
                <a class="text-xl text-white font-semibold">Green Earth</a>
            </div>

        </div>
        <div class="navbar-center hidden lg:flex">
            <ul class="menu menu-horizontal px-1 space-x-3">
                <li class="text-white text-base"><a>About</a></li>
                <li class="text-white text-base"><a>Gallery</a></li>
                <li class="text-white text-base"><a>Plant a Tree</a></li>
            </ul>
        </div>
        <div class="navbar-end">
            <a class="btn btn-primary text-base rounded-full border-none font-semibold bg-[#FACC15] text-[#15803D]">Plant
                a Tree</a>
        </div>
    </div>

    <!-- banner -->
    <section class="bg-[#CFF0DC] flex flex-col md:flex-row items-center">
        <div class="w-4/12"><img src="./assets/hero-leaf1.png" alt=""></div>

        <div class="w-6/12 text-center space-y-2">
            <h1 class="font-bold text-4xl ">Plant a Tree, Grow a Future</h1>
            <p class="text-base font-normal text-gray-600">Join our mission to plant 1 million trees and make the Earth greener for future
                generations.</p>
            <a class="btn btn-primary text-base rounded-full border-none font-semibold bg-[#FACC15] text-[#15803D] mt-5">Get
                Involved</a>

        </div>
        <div class="w-4/12"><img src="./assets/hero-leaf2.png" alt=""></div>

    </section>

</body>

</html>
